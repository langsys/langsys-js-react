name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # OIDC trusted publishing (tokenless) requires npm >= 11.5.1; Node 24 ships npm 11.3.x.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck

      - run: npm test -- --run

      - run: npm run build

      - run: npm publish --provenance
